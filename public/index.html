<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ABM — Aasaan Bhaashaa Mein</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:radial-gradient(circle at top left,#1e293b,#0f172a 60%);
color:#f8fafc;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:40px 20px;
}

.container{
width:100%;
max-width:1000px;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.08);
border-radius:24px;
padding:60px;
box-shadow:0 30px 80px rgba(0,0,0,0.65);
}

.logo{
text-align:center;
margin-bottom:40px;
}

.logo-main{
font-size:52px;
font-weight:700;
letter-spacing:6px;
background:linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.logo-sub{
font-size:13px;
letter-spacing:4px;
color:#94a3b8;
margin-top:8px;
text-transform:uppercase;
}

.controls{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:25px;
}

label{
font-size:13px;
color:#cbd5e1;
margin-bottom:6px;
display:block;
}

select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.15);
background:#1e293b;
color:#fff;
}

textarea{
width:100%;
min-height:220px;
padding:18px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.1);
background:rgba(255,255,255,0.05);
color:#fff;
font-size:15px;
margin-bottom:20px;
resize:vertical;
}

textarea::placeholder{
color:#64748b;
}

button{
background:linear-gradient(135deg,#6366f1,#8b5cf6);
border:none;
padding:14px 36px;
border-radius:12px;
color:white;
font-weight:600;
cursor:pointer;
transition:.25s;
box-shadow:0 10px 35px rgba(99,102,241,.45);
}

button:hover{
transform:translateY(-2px);
box-shadow:0 15px 45px rgba(139,92,246,.6);
}

.output-box{
margin-top:30px;
padding:22px;
border-radius:14px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
min-height:140px;
white-space:pre-wrap;
line-height:1.6;
}

.footer{
margin-top:25px;
font-size:12px;
color:#475569;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<div class="logo-main">ABM</div>
<div class="logo-sub">Aasaan Bhaashaa Mein</div>
</div>

<div class="controls">

<div>
<label>Mode</label>
<select id="mode">
<option value="academic">Academic</option>
<option value="upsc">UPSC</option>
<option value="administrative">Administrative</option>
<option value="policy">Policy Analysis</option>
<option value="plain">Plain Language</option>
</select>
</div>

<div>
<label>Language</label>
<select id="language">
<option value="english">English</option>
<option value="hindi">Hindi</option>
</select>
</div>

</div>

<textarea id="inputText" placeholder="Paste textbook, policy, or academic content here..."></textarea>

<button onclick="simplifyText()">Transform</button>

<div class="output-box" id="output"></div>

<div class="footer">
ABM Engine • Intelligent Academic Simplification
</div>

</div>

<script>

async function simplifyText(){

const input=document.getElementById("inputText").value;
const mode=document.getElementById("mode").value;
const language=document.getElementById("language").value;
const output=document.getElementById("output");

if(!input.trim()){
output.innerText="Please enter some text.";
return;
}

output.innerText="Transforming...";

try{

const response=await fetch("/simplify",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
text:input,
mode:mode,
language:language
})
});

const data=await response.json();

if(data.result){
output.innerText=data.result;
}else{
output.innerText="Server Error";
}

}catch(error){
output.innerText="Error: "+error.message;
}

}

</script>

</body>
</html>
