<script>

async function simplifyText(){

const input=document.getElementById("inputText").value;
const mode=document.getElementById("mode").value;
const language=document.getElementById("language").value;
const output=document.getElementById("output");
const button=document.querySelector("button");

if(!input.trim()){
output.innerText="Please enter some text.";
return;
}

output.innerText="Transforming...";
button.disabled=true;

try{

const controller=new AbortController();
const timeout=setTimeout(()=>controller.abort(),60000);

const response=await fetch("/simplify",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
text:input,
mode:mode,
language:language
}),
signal:controller.signal
});

clearTimeout(timeout);

if(!response.ok){
throw new Error("Server error: "+response.status);
}

const data=await response.json();

if(data.result){
output.innerText=data.result;
}
else if(data.error){
output.innerText="Error: "+data.error;
}
else{
output.innerText="Unexpected server response.";
}

}catch(error){

if(error.name==="AbortError"){
output.innerText="Server took too long to respond. Please try again.";
}else{
output.innerText="Error: "+error.message;
}

}

button.disabled=false;

}

</script>
